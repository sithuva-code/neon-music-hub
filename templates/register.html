<!DOCTYPE html>
<html>
<head>
<title>register - Neon Hub</title>
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at top,#0f0c29,#1a1a40,#000);
font-family:Orbitron,sans-serif;
color:white;
overflow:hidden;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px;
border-radius:20px;
border:1px solid #00f7ff;
backdrop-filter:blur(20px);
box-shadow:0 0 25px #00f7ff55;
width:300px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:30px;
border:1px solid #00f7ff;
background:black;
color:white;
outline:none;
box-shadow:0 0 15px #00f7ff inset;
}

button{
width:100%;
padding:12px;
border-radius:30px;
border:none;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:white;
box-shadow:0 0 20px #00f7ff;
}
</style>
</head>
<body>

<div class="card">
<h2>⚡ LOGIN</h2>
<form method="post">
<input name="username" placeholder="Username">
<input type="password" name="password" placeholder="Password">
<button>Enter</button>
</form>
</div>

</body>
</html>
