<!DOCTYPE html>
<html>
<head>
<title>Upload - Neon Hub</title>
<style>
body{
margin:0;
background:linear-gradient(135deg,#0f0c29,#302b63,#000);
font-family:Orbitron;
color:white;
}

.container{
width:400px;
margin:100px auto;
padding:40px;
background:rgba(255,255,255,0.05);
border-radius:20px;
border:1px solid #00f7ff;
backdrop-filter:blur(25px);
box-shadow:0 0 25px #00f7ff55;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:1px solid #00f7ff;
background:black;
color:white;
}

button{
padding:12px;
width:100%;
border:none;
background:#00f7ff;
color:black;
border-radius:20px;
font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
<h2>🚀 Upload Song</h2>
<form method="post" enctype="multipart/form-data">
<input name="title" placeholder="Title">
<input name="artist" placeholder="Artist">
<textarea name="lyrics" placeholder="Lyrics"></textarea>
<input type="file" name="file">
<button>Upload</button>
</form>
</div>

</body>
</html>
