<!DOCTYPE html>
<html>
<head>
<title>NEON MUSIC HUB</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

body{
margin:0;
font-family:'Orbitron',sans-serif;
background: radial-gradient(circle at top,#0f0c29,#1a1a40,#000);
color:white;
overflow-x:hidden;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
border-bottom:1px solid #00f7ff;
box-shadow:0 0 20px #00f7ff;
}

nav a{
color:#00f7ff;
text-decoration:none;
margin:0 15px;
font-weight:bold;
transition:0.3s;
}

nav a:hover{
color:white;
text-shadow:0 0 15px #00f7ff;
}

.hero{
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:60px;
color:#00f7ff;
text-shadow:0 0 20px #00f7ff,0 0 40px #00f7ff;
}

.search-box{
margin-top:30px;
}

.search-box input{
width:300px;
padding:12px;
border:none;
border-radius:30px;
outline:none;
background:black;
color:white;
border:1px solid #00f7ff;
box-shadow:0 0 15px #00f7ff inset;
}

.card-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid #00f7ff;
border-radius:20px;
padding:20px;
backdrop-filter:blur(20px);
box-shadow:0 0 20px #00f7ff33;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px #00f7ff;
}

.card h3{
color:#00f7ff;
}

.btn{
display:inline-block;
padding:10px 20px;
border-radius:30px;
background:#00f7ff;
color:black;
text-decoration:none;
margin-top:10px;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:white;
box-shadow:0 0 20px #00f7ff;
}

footer{
text-align:center;
padding:30px;
border-top:1px solid #00f7ff;
color:#00f7ff;
}
</style>

</head>
<body>

<nav>
<div>⚡ NEON HUB</div>
<div>
<a href="/">Home</a>
<a href="/upload">Upload</a>
<a href="/login">Login</a>
<a href="/register">Register</a>
</div>
</nav>

<div class="hero">
<h1>FUTURE MUSIC EXPERIENCE</h1>
<div class="search-box">
<form action="/search">
<input type="text" name="q" placeholder="Search Songs...">
</form>
</div>
</div>

<div class="card-container">
{% for song in songs %}
<div class="card">
<h3>{{ song[1] }}</h3>
<p>{{ song[2] }}</p>
<p>{{ song[5] }} views</p>
<a href="/song/{{ song[0] }}" class="btn">Play</a>
</div>
{% endfor %}
</div>

<footer>
2026 © Neon Music Hub | Ultra Future UI
</footer>

</body>
</html>
